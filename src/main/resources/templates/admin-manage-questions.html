<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Questions - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .navbar {
            padding: 1rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .main-content {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #93c5fd;
        }

        .submit-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Alerts */
        .alert {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        /* Questions List */
        .questions-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .question-card {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .question-card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin: 0;
            color: var(--text-main);
            flex-grow: 1;
            padding-right: 2rem;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .btn-icon {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-edit {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }
        .btn-edit:hover { background: rgba(251, 191, 36, 0.2); transform: scale(1.05); }

        .btn-danger {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); transform: scale(1.05); }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* Modals */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--bg-dark);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-content h3 {
            margin: 0 0 1.5rem 0;
            color: #93c5fd;
            font-size: 1.3rem;
        }

        .form-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }

    </style>
</head>
<body>

    <nav class="navbar">
        <h1><i class="fa-solid fa-clipboard-question"></i> Manage Questions</h1>
        <div class="nav-actions">
            <a th:href="@{/admin/dashboard}" class="nav-btn"><i class="fa-solid fa-house"></i> Home</a>
            <a th:href="@{/logout}" class="nav-btn" style="border-color: rgba(239, 68, 68, 0.3); color: #fca5a5;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <div class="main-content">
        
        <div class="header">
            <h2>Feedback Questionnaire</h2>
            <button onclick="showModal('addModal')" class="submit-btn">
                <i class="fa-solid fa-plus"></i> Add Question
            </button>
        </div>

        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success">
            <i class="fa-solid fa-circle-check"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Questions List -->
        <div class="questions-container">
            
            <div th:if="${questions.empty}" class="glass empty-state">
                <i class="fa-regular fa-comment-dots"></i>
                <h2>No questions found</h2>
                <p>Add your first question to build the feedback form!</p>
            </div>

            <div th:each="question, iterStat : ${questions}" class="question-card glass">
                <p class="question-text"><span style="color:#93c5fd; font-weight:600; margin-right:8px;" th:text="${iterStat.count} + '.'"></span> <span th:text="${question.text}"></span></p>
                <div class="actions">
                    <button class="btn-icon btn-edit" th:onclick="showEditModal([[${question.questionId}]], [[${question.text}]])" title="Edit">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button class="btn-icon btn-danger" th:onclick="confirmDelete([[${question.questionId}]])" title="Delete">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Modals -->

    <!-- Add Question Modal -->
    <div id="addModal" class="modal-backdrop">
        <div class="modal-content">
            <h3><i class="fa-solid fa-plus-circle"></i> Add New Question</h3>
            <form th:action="@{/admin/manage-questions/add}" method="post">
                <input type="text" name="questionText" class="form-control" placeholder="E.g., How would you rate the teaching style?" required>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="hideModal('addModal')">Cancel</button>
                    <button type="submit" class="submit-btn">Save Question</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Question Modal -->
    <div id="editModal" class="modal-backdrop">
        <div class="modal-content">
            <h3><i class="fa-solid fa-pen-to-square"></i> Edit Question</h3>
            <form th:action="@{/admin/manage-questions/update}" method="post">
                <input type="hidden" id="editQuestionId" name="questionId">
                <input type="text" id="editQuestionText" name="questionText" class="form-control" placeholder="Update question text..." required>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="hideModal('editModal')">Cancel</button>
                    <button type="submit" class="submit-btn" style="background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);">Update</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-backdrop">
        <div class="modal-content">
            <h3><i class="fa-solid fa-triangle-exclamation" style="color: #f87171;"></i> Confirm Delete</h3>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Are you sure you want to delete this question? This will permanently remove it from the feedback form.</p>
            <form th:action="@{/admin/manage-questions/delete}" method="post">
                <input type="hidden" id="deleteQuestionId" name="questionId">
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="hideModal('deleteModal')">Cancel</button>
                    <button type="submit" class="submit-btn" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">Yes, Delete</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function showModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
        }

        function hideModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function showEditModal(questionId, questionText) {
            document.getElementById('editQuestionId').value = questionId;
            document.getElementById('editQuestionText').value = questionText;
            showModal('editModal');
        }

        function confirmDelete(questionId) {
            document.getElementById('deleteQuestionId').value = questionId;
            showModal('deleteModal');
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal-backdrop')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
