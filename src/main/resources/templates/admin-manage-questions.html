<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Questions - Feedback System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary-color: #ffd700;
            --background-dark: #121212;
            --background-light: #1e1e1e;
            --text-color: #ffffff;
            --text-secondary: #cccccc;
            --success-color: #4CAF50;
            --error-color: #ff5555;
            --warning-color: #ff9800;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-dark);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 250px;
            background-color: var(--background-light);
            padding: 2rem;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background-color: var(--primary-color);
            color: var(--background-dark);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-danger {
            background-color: var(--error-color);
            color: white;
        }

        .btn-edit {
            background-color: var(--warning-color);
            color: white;
        }

        .questions-container {
            background-color: var(--background-light);
            border-radius: 12px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .question-item {
            background-color: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-text {
            flex: 1;
            margin-right: 1rem;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--background-light);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 1rem;
        }

        .modal input:focus, .modal textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease-out;
        }

        .alert-success {
            background-color: rgba(76, 175, 80, 0.1);
            border-left: 4px solid var(--success-color);
            color: var(--success-color);
        }

        .alert-error {
            background-color: rgba(255, 85, 85, 0.1);
            border-left: 4px solid var(--error-color);
            color: var(--error-color);
        }

        .no-questions {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Admin Panel</h1>
        <nav>
            <!-- Add navigation links here -->
        </nav>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Manage Feedback Questions</h1>
            <button onclick="showAddModal()" class="btn">
                <i class="fas fa-plus"></i> Add New Question
            </button>
        </div>

        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}">Operation successful!</span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}">An error occurred!</span>
        </div>

        <!-- Questions List -->
        <div class="questions-container">
            <div th:if="${questions.empty}" class="no-questions">
                <i class="fas fa-question-circle fa-3x"></i>
                <p>No questions found. Add your first question!</p>
            </div>
            <div th:each="question : ${questions}" class="question-item">
                <div class="question-text" th:text="${question.text}">Question text here</div>
                <div class="actions">
                    <button class="btn btn-edit" th:onclick="showEditModal([[${question.questionId}]], [[${question.text}]])">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-danger" th:onclick="confirmDelete([[${question.questionId}]])">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Question Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h2>Add New Question</h2>
            <form th:action="@{/admin/manage-questions/add}" method="post">
                <input type="text" name="questionText" placeholder="Enter question text" required>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-danger" onclick="hideModal('addModal')">Cancel</button>
                    <button type="submit" class="btn">Add Question</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Question Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Edit Question</h2>
            <form th:action="@{/admin/manage-questions/update}" method="post">
                <input type="hidden" id="editQuestionId" name="questionId">
                <input type="text" id="editQuestionText" name="questionText" placeholder="Enter question text" required>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-danger" onclick="hideModal('editModal')">Cancel</button>
                    <button type="submit" class="btn">Update Question</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h2>Confirm Delete</h2>
            <p>Are you sure you want to delete this question? This action cannot be undone.</p>
            <form th:action="@{/admin/manage-questions/delete}" method="post">
                <input type="hidden" id="deleteQuestionId" name="questionId">
                <div class="modal-buttons">
                    <button type="button" class="btn" onclick="hideModal('deleteModal')">Cancel</button>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function showAddModal() {
            document.getElementById('addModal').style.display = 'block';
        }

        function showEditModal(questionId, questionText) {
            document.getElementById('editQuestionId').value = questionId;
            document.getElementById('editQuestionText').value = questionText;
            document.getElementById('editModal').style.display = 'block';
        }

        function confirmDelete(questionId) {
            document.getElementById('deleteQuestionId').value = questionId;
            document.getElementById('deleteModal').style.display = 'block';
        }

        function hideModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
