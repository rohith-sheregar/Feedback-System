<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Feedback System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism utilities */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Navbar */
        .navbar {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #fee2e2;
            transform: translateY(-2px);
        }

        .main-content {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
        }

        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .card {
            padding: 2.5rem 2rem;
            text-align: center;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #60a5fa;
        }

        .card h2 {
            font-size: 3rem;
            margin: 0 0 0.5rem 0;
            color: #fff;
            background: linear-gradient(to right, #60a5fa, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .dashboard-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .action-btn {
            background: rgba(59, 130, 246, 0.1);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .action-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1><i class="fa-solid fa-shield-halved"></i> Admin Portal</h1>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button onclick="openPasswordModal()" class="action-btn glass" style="padding: 0.6rem 1.2rem; font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;">
                <i class="fa-solid fa-key"></i> Change Password
            </button>
            <a th:href="@{/logout}" class="logout-btn">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </a>
        </div>
    </nav>

    <div class="main-content">
        
        <!-- Flash messages -->
        <div th:if="${error}" class="alert alert-error" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; padding: 1rem; border-radius: 8px; margin-bottom: 2rem;">
            <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success" style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; padding: 1rem; border-radius: 8px; margin-bottom: 2rem;">
            <i class="fa-solid fa-circle-check"></i> <span th:text="${success}"></span>
        </div>
        <div class="dashboard-cards">
            <div class="card glass">
                <i class="fa-solid fa-user-graduate card-icon"></i>
                <h2 th:text="${studentCount}">0</h2>
                <p>Total Students</p>
            </div>
            
            <div class="card glass">
                <i class="fa-solid fa-book-open card-icon"></i>
                <h2 th:text="${courseCount}">0</h2>
                <p>Total Courses</p>
            </div>
            
            <div class="card glass">
                <i class="fa-solid fa-chalkboard-user card-icon"></i>
                <h2 th:text="${facultyCount}">0</h2>
                <p>Total Faculty</p>
            </div>
        </div>

        <div class="dashboard-actions">
            <a th:href="@{/admin/manage-courses}" class="action-btn glass">
                <i class="fa-solid fa-list-check"></i> Manage Courses
            </a>
            <a th:href="@{/admin/manage-students}" class="action-btn glass">
                <i class="fa-solid fa-users-gear"></i> Manage Students
            </a>
            <a th:href="@{/admin/manage-questions}" class="action-btn glass">
                <i class="fa-solid fa-clipboard-question"></i> Manage Questions
            </a>
        </div>

    </div>

    <!-- Change Password Modal -->
    <div id="passwordModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div class="modal-content glass" style="background: var(--bg-card); padding: 2.5rem; border-radius: 16px; width: 400px; max-width: 90%; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3 style="margin: 0; color: #fff; font-size: 1.5rem;"><i class="fa-solid fa-key" style="color: #60a5fa;"></i> Change Password</h3>
                <button onclick="closePasswordModal()" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; transition: color 0.3s;"><i class="fa-solid fa-times"></i></button>
            </div>
            <form th:action="@{/admin/change-password}" method="post">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; color: var(--text-muted); margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500;">Current Password</label>
                    <input type="password" name="oldPassword" required style="width: 100%; padding: 0.9rem; border-radius: 8px; background: rgba(15,23,42,0.7); border: 1px solid rgba(255,255,255,0.1); color: #fff; box-sizing: border-box; font-family: inherit; font-size: 1rem; transition: border-color 0.3s;">
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; color: var(--text-muted); margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500;">New Password</label>
                    <input type="password" name="newPassword" required style="width: 100%; padding: 0.9rem; border-radius: 8px; background: rgba(15,23,42,0.7); border: 1px solid rgba(255,255,255,0.1); color: #fff; box-sizing: border-box; font-family: inherit; font-size: 1rem; transition: border-color 0.3s;">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; color: var(--text-muted); margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500;">Confirm New Password</label>
                    <input type="password" name="confirmPassword" required style="width: 100%; padding: 0.9rem; border-radius: 8px; background: rgba(15,23,42,0.7); border: 1px solid rgba(255,255,255,0.1); color: #fff; box-sizing: border-box; font-family: inherit; font-size: 1rem; transition: border-color 0.3s;">
                </div>
                <button type="submit" class="action-btn" style="width: 100%; padding: 1rem; border: none; cursor: pointer; background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); color: #fff; border-radius: 8px; font-weight: 600; font-size: 1.05rem;">
                    Update Password <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>
    
    <script>
        function openPasswordModal() {
            document.getElementById('passwordModal').style.display = 'flex';
        }
        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
        }
        
        // Add focus effects to modal inputs
        document.querySelectorAll('#passwordModal input').forEach(input => {
            input.addEventListener('focus', function() {
                this.style.borderColor = '#60a5fa';
                this.style.outline = 'none';
            });
            input.addEventListener('blur', function() {
                this.style.borderColor = 'rgba(255,255,255,0.1)';
            });
        });
    </script>
</body>
</html>
