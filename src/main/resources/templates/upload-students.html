<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Students - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-attachment: fixed;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: var(--text-main);
            position: relative;
        }

        .upload-container {
            width: 100%;
            max-width: 500px;
            padding: 3rem 2.5rem;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            text-align: center;
            animation: containerAppear 0.5s ease-out;
        }

        @keyframes containerAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .file-upload-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .file-upload-input {
            width: 100%;
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.5);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload-input:hover {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.7);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .back-link {
            color: #93c5fd;
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #bfdbfe;
            text-decoration: underline;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

    </style>
</head>
<body>

    <div class="upload-container">
        
        <h2><i class="fa-solid fa-cloud-arrow-up" style="color: #60a5fa;"></i> Upload Students</h2>
        <p class="subtitle">Select a CSV file containing student data to import.</p>
        
        <div th:if="${message}" class="alert-success">
            <i class="fa-solid fa-circle-check"></i>
            <span th:text="${message}"></span>
        </div>

        <form th:action="@{/admin/upload-students}" method="post" enctype="multipart/form-data">
            
            <div class="file-upload-wrapper">
                <input type="file" name="file" accept=".csv" class="file-upload-input" required />
            </div>

            <button type="submit" class="submit-btn">
                <i class="fa-solid fa-upload"></i> Process CSV Upload
            </button>
            
        </form>

        <a th:href="@{/admin/manage-students}" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Manage Students
        </a>

    </div>

</body>
</html>
