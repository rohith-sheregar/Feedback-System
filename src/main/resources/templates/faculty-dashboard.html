<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - Feedback System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #064e3b 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism utilities */
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Navbar */
        .navbar {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #34d399, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #fee2e2;
            transform: translateY(-2px);
        }

        /* Main Content Grid */
        .main-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            width: 100%;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 1024px) {
            .main-container {
                grid-template-columns: 350px 1fr;
            }
        }

        /* Faculty Profile Card */
        .profile-card {
            padding: 2rem;
            text-align: center;
            height: fit-content;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10b981, #34d399);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 0.5rem;
        }

        .profile-badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            display: inline-block;
            margin: 0.5rem 0;
            width: 100%;
            box-sizing: border-box;
        }

        /* Dashboard Area */
        .dashboard-area {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        /* Custom Select */
        .course-select-wrapper {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
        }

        .course-select-wrapper select {
            width: 100%;
            appearance: none;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .course-select-wrapper select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .course-select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Course Statistics Section */
        .course-section {
            animation: fadeIn 0.4s ease;
            display: none; /* Controlled by JS */
        }
        
        .course-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .course-header h2 {
            margin: 0;
            color: #a7f3d0;
            font-size: 1.25rem;
        }

        .stat-badge {
            background: var(--primary);
            color: var(--bg-dark);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .chart-card canvas {
            max-width: 100%;
            max-height: 250px;
        }

        /* Comments Section */
        .comments-card {
            padding: 2rem;
        }
        
        .comments-card h3 {
            margin: 0 0 1.5rem;
            color: #a7f3d0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        
        /* Scrollbar styles */
        .comment-list::-webkit-scrollbar { width: 6px; }
        .comment-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .comment-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .comment-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        .comment-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--primary);
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            line-height: 1.5;
            transition: all 0.2s;
        }
        
        .comment-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        
        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1><i class="fa-solid fa-chalkboard-user"></i> Faculty Portal</h1>
        <a th:href="@{/logout}" class="logout-btn">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </a>
    </nav>

    <div class="main-container">
        
        <!-- Sidebar with faculty info -->
        <div class="glass profile-card">
            <div class="profile-avatar">
                <i class="fa-solid fa-user-tie"></i>
            </div>
            <h2 class="profile-name" th:text="${faculty.name}">Faculty Name</h2>
            
            <div class="profile-badge">
                <i class="fa-solid fa-envelope" style="margin-right: 5px;"></i> 
                <span th:text="${faculty.email}">Email</span>
            </div>
            
            <div class="profile-badge">
                <i class="fa-solid fa-building" style="margin-right: 5px;"></i> 
                <span th:text="${faculty.department != null ? faculty.department.departmentName : 'Department not assigned'}">Department</span>
            </div>
        </div>

        <!-- Dashboard Area -->
        <div class="dashboard-area">
            
            <div class="top-bar">
                <div class="course-select-wrapper">
                    <select id="courseSelect" onchange="showCourseData(this.value)">
                        <option value="" disabled selected>Select a course to view analytics...</option>
                        <option th:each="ca : ${courseAssignments}"
                                th:value="${ca.assignmentId}"
                                th:text="${ca.course.courseName + ' (' + ca.section.sectionName + ')'}">
                        </option>
                    </select>
                </div>
            </div>
            
            <!-- Default Empty State before selection -->
            <div id="defaultEmptyState" class="empty-state glass">
                <i class="fa-solid fa-chart-pie"></i>
                <h2>Select a Course</h2>
                <p>Please select a course from the dropdown above to view feedback analytics and comments.</p>
            </div>

            <!-- Dynamic course sections -->
            <div th:each="ca : ${courseAssignments}" th:id="'course-' + ${ca.assignmentId}" class="course-section">
                
                <div class="course-header glass">
                    <h2><i class="fa-solid fa-book"></i> <span th:text="${ca.course.courseName + ' - ' + ca.section.sectionName}"></span></h2>
                    <div class="stat-badge">
                        <i class="fa-solid fa-users"></i>
                        <span th:text="${courseStats[ca.assignmentId].feedbackCount}">0</span> Responses
                    </div>
                </div>

                <div class="charts-grid">
                    <div th:each="question : ${questions}" class="chart-card glass">
                        <canvas th:id="'chart-' + ${ca.assignmentId} + '-' + ${question.questionId}"></canvas>
                    </div>
                </div>

                <div class="comments-card glass">
                    <h3><i class="fa-regular fa-comments"></i> Anonymous Comments</h3>
                    
                    <div class="comment-list" th:if="${not #lists.isEmpty(courseStats[ca.assignmentId].comments)}">
                        <div th:each="comment : ${courseStats[ca.assignmentId].comments}" class="comment-item">
                            <span th:text="${comment}"></span>
                        </div>
                    </div>
                    
                    <div th:if="${#lists.isEmpty(courseStats[ca.assignmentId].comments)}" class="empty-state" style="padding: 2rem;">
                        <i class="fa-regular fa-comment-slash" style="font-size: 2rem;"></i>
                        <p style="margin-top: 0.5rem;">No written comments provided yet.</p>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // Data injected by Thymeleaf
        const courseStats = /*[[${courseStats}]]*/ {};
        const questions = /*[[${questions}]]*/ [];
        
        // Colors for charts (1 to 5 stars)
        const chartColors = [
            'rgba(239, 68, 68, 0.8)',   // 1 - Red
            'rgba(249, 115, 22, 0.8)',  // 2 - Orange
            'rgba(234, 179, 8, 0.8)',   // 3 - Yellow
            'rgba(16, 185, 129, 0.8)',  // 4 - Green
            'rgba(56, 189, 248, 0.8)'   // 5 - Blue
        ];
        const chartBorders = [
            '#ef4444', '#f97316', '#eab308', '#10b981', '#38bdf8'
        ];
        
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Inter', sans-serif";

        function showCourseData(courseId) {
            // Hide default empty state
            document.getElementById('defaultEmptyState').style.display = 'none';

            // Hide all course sections
            document.querySelectorAll('.course-section').forEach(section => {
                section.classList.remove('active');
            });

            if (courseId) {
                // Show selected course section
                const courseSection = document.getElementById('course-' + courseId);
                if (courseSection) {
                    courseSection.classList.add('active');
                    initializeCharts(courseId);
                }
            }
        }

        function initializeCharts(courseId) {
            const stats = courseStats[courseId];
            if (!stats || !stats.questionStats) return;

            questions.forEach(question => {
                const questionStats = stats.questionStats[question.questionId];
                if (questionStats) {
                    const ctx = document.getElementById('chart-' + courseId + '-' + question.questionId);
                    if (!ctx) return;

                    // Destroy existing chart if it exists to avoid overlaps
                    if (Chart.getChart(ctx)) {
                        Chart.getChart(ctx).destroy();
                    }

                    // Data array [1-star, 2-star, 3-star, 4-star, 5-star]
                    const ratingsData = [
                        parseInt(questionStats['1'] || 0),
                        parseInt(questionStats['2'] || 0),
                        parseInt(questionStats['3'] || 0),
                        parseInt(questionStats['4'] || 0),
                        parseInt(questionStats['5'] || 0)
                    ];

                    const totalResponses = ratingsData.reduce((a, b) => a + b, 0);

                    if (totalResponses > 0) {
                        new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: ['1 Star', '2 Stars', '3 Stars', '4 Stars', '5 Stars'],
                                datasets: [{
                                    data: ratingsData,
                                    backgroundColor: chartColors,
                                    borderColor: chartBorders,
                                    borderWidth: 1,
                                    hoverOffset: 4
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                cutout: '65%',
                                plugins: {
                                    legend: {
                                        display: false // Hide legend to save space
                                    },
                                    title: {
                                        display: true,
                                        text: question.text,
                                        color: '#f8fafc',
                                        font: {
                                            size: 13,
                                            weight: '500'
                                        },
                                        padding: { bottom: 15 }
                                    },
                                    tooltip: {
                                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                        titleColor: '#fff',
                                        bodyColor: '#cbd5e1',
                                        borderColor: 'rgba(255,255,255,0.1)',
                                        borderWidth: 1,
                                        padding: 12,
                                        callbacks: {
                                            label: function(context) {
                                                const label = context.label || '';
                                                const value = context.parsed || 0;
                                                const percentage = Math.round((value / totalResponses) * 100);
                                                return `${label}: ${value} vote${value!==1?'s':''} (${percentage}%)`;
                                            }
                                        }
                                    }
                                }
                            },
                            // Add custom plugin to draw text in center of doughnut
                            plugins: [{
                                id: 'centerText',
                                beforeDraw: function(chart) {
                                    var width = chart.width,
                                        height = chart.height,
                                        ctx = chart.ctx;

                                    ctx.restore();
                                    var fontSize = (height / 114).toFixed(2);
                                    ctx.font = "bold " + fontSize + "em Inter";
                                    ctx.textBaseline = "middle";
                                    ctx.fillStyle = "#f8fafc";

                                    // Calculate average rating
                                    let sum = 0;
                                    for(let i=0; i<ratingsData.length; i++) {
                                        sum += ratingsData[i] * (i+1);
                                    }
                                    let avg = (sum / totalResponses).toFixed(1);

                                    var text = avg + " ★",
                                        textX = Math.round((width - ctx.measureText(text).width) / 2),
                                        textY = (height / 2) + 15; // Shift down slightly because of title

                                    ctx.fillText(text, textX, textY);
                                    ctx.save();
                                }
                            }]
                        });
                    } else {
                        // Display empty state in chart container
                        const parent = ctx.parentElement;
                        // Clear previous empty state if any
                        const existingMsg = parent.querySelector('.chart-empty-msg');
                        if (existingMsg) existingMsg.remove();
                        
                        ctx.style.display = 'none'; // Hide canvas
                        const msg = document.createElement('div');
                        msg.className = 'chart-empty-msg empty-state';
                        msg.style.padding = '1rem';
                        msg.innerHTML = '<i class="fa-solid fa-chart-pie" style="font-size:1.5rem; margin-bottom:0.5rem; display:block;"></i><span style="font-size:0.9rem;">No data</span>';
                        
                        // Insert title above empty state
                        const title = document.createElement('h4');
                        title.style.margin = '0 0 1rem';
                        title.style.color = '#f8fafc';
                        title.style.fontSize = '13px';
                        title.style.fontWeight = '500';
                        title.style.textAlign = 'center';
                        title.textContent = question.text;
                        
                        parent.appendChild(title);
                        parent.appendChild(msg);
                    }
                }
            });
        }
    </script>
</body>
</html>
